<body>

        <div id="score" class="score">スコア: 0</div>

"}, {"en": "short", "ja": "背の低い（5字）"}, {"en": "old", "ja": "古い、年取った"}, {"en": "new", "ja": "新しい、新人の"}, {"en": "light", "ja": "軽い、明るい"}, {"en": "heavy", "ja": "重い、（天候・交通量が）激しい"}, {"en": "slow", "ja": "ゆっくりの"}, {"en": "fast", "ja": "速い"}, {"en": "noisy", "ja": "うるさい(n)"}, {"en": "quiet", "ja": "静かな"}, {"en": "right", "ja": "正しい、右の"}, {"en": "wrong", "ja": "間違っている"}, {"en": "dirty", "ja": "汚い"}, {"en": "beautiful", "ja": "美しい"}, {"en": "fat", "ja": "太った"}, {"en": "tall", "ja": "背の高い"}, {"en": "strong", "ja": "強い"}, {"en": "delicious", "ja": "とてもおいしい"}, {"en": "excited", "ja": "わくわくした"}, {"en": "bored", "ja": "退屈した"}, {"en": "surprised", "ja": "驚いた"}, {"en": "zero", "ja": "0(zから)"}, {"en": "oh", "ja": "0(oから)"}, {"en": "one", "ja": "1"}, {"en": "two", "ja": "2"}, {"en": "three", "ja": "3"}, {"en": "four", "ja": "4"}, {"en": "five", "ja": "5"}, {"en": "six", "ja": "6"}, {"en": "seven", "ja": "7"}, {"en": "eight", "ja": "8"}, {"en": "nine", "ja": "9"}, {"en": "ten", "ja": "10"}, {"en": "eleven", "ja": "11"}, {"en": "twelve", "ja": "12"}, {"en": "thirteen", "ja": "13"}, {"en": "fourteen", "ja": "14"}, {"en": "fifteen", "ja": "15"}, {"en": "sixteen", "ja": "16"}, {"en": "seventeen", "ja": "17"}, {"en": "eighteen", "ja": "18"}, {"en": "nineteen", "ja": "19"}, {"en": "twenty", "ja": "20"}, {"en": "twenty-one", "ja": "21"}, {"en": "thirty-two", "ja": "32"}, {"en": "forty-three", "ja": "43"}, {"en": "forty-four", "ja": "44"}, {"en": "fifty-five", "ja": "55"}, {"en": "sixty-six", "ja": "66"}, {"en": "seventy-seven", "ja": "77"}, {"en": "eighty-eight", "ja": "88"}, {"en": "ninety-nine", "ja": "99"}, {"en": "one hundred", "ja": "100"}, {"en": "one hundred one", "ja": "101(3語)"}, {"en": "one hundred and one", "ja": "101(4語)"}, {"en": "one thousand", "ja": "1000"}, {"en": "one", "ja": "1番目の"}, {"en": "two", "ja": "2番目の"}, {"en": "three", "ja": "3番目の"}, {"en": "four", "ja": "4番目の"}, {"en": "five", "ja": "5番目の"}, {"en": "six", "ja": "6番目の"}, {"en": "seven", "ja": "7番目の"}, {"en": "eight", "ja": "8番目の"}, {"en": "nine", "ja": "9番目の"}, {"en": "ten", "ja": "10番目の"}, {"en": "eleven", "ja": "11番目の"}, {"en": "twelve", "ja": "12番目の"}, {"en": "thirteen", "ja": "13番目の"}, {"en": "fourteen", "ja": "14番目の"}, {"en": "fifteen", "ja": "15番目の"}, {"en": "sixteen", "ja": "16番目の"}, {"en": "seventeen", "ja": "17番目の"}, {"en": "eighteen", "ja": "18番目の"}, {"en": "nineteen", "ja": "19番目の"}, {"en": "twenty", "ja": "20番目の"}, {"en": "twenty-one", "ja": "21番目の"}, {"en": "thirty-two", "ja": "32番目の"}, {"en": "forty-three", "ja": "43番目の"}, {"en": "forty-four", "ja": "44番目の"}, {"en": "fifty-five", "ja": "55番目の"}, {"en": "sixty-six", "ja": "66番目の"}, {"en": "seventy-seven", "ja": "77番目の"}, {"en": "eighty-eight", "ja": "88番目の"}, {"en": "ninety-nine", "ja": "99番目の"}, {"en": "one hundred", "ja": "100番目の"}, {"en": "one hundred one", "ja": "101(3語)"}, {"en": "one hundred and one", "ja": "101(4語)"}, {"en": "one thousand", "ja": "1000"}];
        const totalWordsLength = allWords.length; // 全単語数
        let currentWordIndex = 0; // Now represents questions answered
        let score = 0;
        let gameStarted = false;
        let currentWordStage = 0; // 0: Japanese only, waiting for first Enter; 1: English revealed, waiting for second Enter
        let currentQuestionData = null; // Store the current word object {en, ja}
        let effectiveStartRange = 0; // 0-based index for filtering
        let effectiveEndRange = totalWordsLength - 1; // 0-based index for filtering

        const japaneseMeaningDisplay = document.getElementById('japanese-meaning');
        const englishWordDisplay = document.getElementById('english-word');
        const textInput = document.getElementById('text-input');
        const scoreDisplay = document.getElementById('score');
        const startButton = document.getElementById('start-button');
        const messageDisplay = document.getElementById('message');
        const feedbackDisplay = document.getElementById('feedback-display');
        const questionCounter = document.getElementById('questionCounter');
        const currentRangeDisplay = document.getElementById('currentRangeDisplay');
        const startRangeInput = document.getElementById('startRangeInput');
        const endRangeInput = document.getElementById('endRangeInput');
        const setRangeButton = document.getElementById('setRangeButton');

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function showFeedback(type) {
            feedbackDisplay.classList.remove('correct-feedback', 'incorrect-feedback');
            if (type === 'correct') {
                feedbackDisplay.textContent = '〇';
                feedbackDisplay.classList.add('correct-feedback');
            } else if (type === 'incorrect') {
                feedbackDisplay.textContent = '✕';
                feedbackDisplay.classList.add('incorrect-feedback');
            }
        }

        function updateRangeDisplay() {
            currentRangeDisplay.textContent = `(範囲: ${effectiveStartRange + 1}-${effectiveEndRange + 1})`;
        }

        function setQuestionRange() {
            let startVal = parseInt(startRangeInput.value, 10);
            let endVal = parseInt(endRangeInput.value, 10);

            if (isNaN(startVal) || startVal < 1) startVal = 1;
            if (isNaN(endVal) || endVal > totalWordsLength) endVal = totalWordsLength;

            if (startVal > endVal) {
                [startVal, endVal] = [endVal, startVal]; // Swap if start is greater than end
            }

            effectiveStartRange = startVal - 1; // Convert to 0-based index
            effectiveEndRange = endVal - 1; // Convert to 0-based index

            startRangeInput.value = startVal;
            endRangeInput.value = endVal;
            updateRangeDisplay();
        }

        function startGame() {
            gameStarted = true;
            score = 0;
            currentWordIndex = 0;
            scoreDisplay.textContent = `スコア: ${score}`;
            textInput.value = '';
            textInput.focus();
            startButton.style.display = 'none';
            messageDisplay.textContent = '';
            feedbackDisplay.textContent = '';
            textInput.disabled = false; // 入力を有効化

            setQuestionRange(); // ゲーム開始時に現在の範囲を適用
            questionCounter.textContent = `問題: ${currentWordIndex}問目`;
            displayNextWord();
        }

        function displayNextWord() {
            const availableWords = allWords.slice(effectiveStartRange, effectiveEndRange + 1);
            if (availableWords.length === 0) {
                englishWordDisplay.textContent = '設定された範囲に問題がありません。';
                textInput.disabled = true;
                return;
            }

            const randomIndex = Math.floor(Math.random() * availableWords.length);
            currentQuestionData = availableWords[randomIndex]; // ランダムに単語を選択

            japaneseMeaningDisplay.textContent = currentQuestionData.ja;
            englishWordDisplay.textContent = ''; // 英単語は最初非表示
            textInput.value = ''; // 新しい単語のために入力欄をクリア
            feedbackDisplay.textContent = ''; // 前の問題のフィードバックをクリア
            textInput.disabled = false; // 入力可能にする
            currentWordStage = 0; // ステージを初期状態にリセット
            textInput.focus();

            questionCounter.textContent = `問題: ${currentWordIndex + 1}問目`; // 1からカウント
        }

        function endGame() {
            gameStarted = false;
            japaneseMeaningDisplay.textContent = '';
            englishWordDisplay.textContent = 'ゲーム終了！';
            textInput.value = '';
            textInput.disabled = true;
            startButton.style.display = 'block';
            startButton.textContent = 'もう一度プレイ';
            messageDisplay.textContent = `最終スコア: ${score}点です！`;
            feedbackDisplay.textContent = '';
            currentQuestionData = null; // ゲーム終了時にデータをリセット
            questionCounter.textContent = `問題: ${currentWordIndex}問目`;
        }

        startButton.addEventListener('click', () => {
            startGame();
        });

        setRangeButton.addEventListener('click', () => {
            setQuestionRange();
            if (gameStarted) {
                 displayNextWord(); // 範囲変更後、次の問題を表示
            }
        });

        // keydownイベントリスナーをdocumentに移動
        document.addEventListener('keydown', (event) => {
            if (!gameStarted) return;

            if (event.key === 'Enter') {
                event.preventDefault(); // デフォルトのフォーム送信動作を防止

                if (currentWordStage === 0) {
                    // 日本語訳が表示されている状態（初回Enter）
                    const typedText = textInput.value.trim();
                    const currentTargetWord = currentQuestionData.en; // 現在の問題の英単語を使用

                    if (typedText === currentTargetWord) {
                        showFeedback('correct');
                        score++;
                        scoreDisplay.textContent = `スコア: ${score}`;
                    } else {
                        showFeedback('incorrect');
                    }

                    japaneseMeaningDisplay.textContent = ''; // 日本語訳をクリア
                    englishWordDisplay.textContent = currentTargetWord; // 正しい英単語を表示
                    textInput.value = ''; // 入力フィールドをクリア
                    textInput.disabled = true; // 入力を無効化（次のEnterまで）

                    currentWordStage = 1; // ステージを1に移行

                } else if (currentWordStage === 1) {
                    // 英単語とフィードバックが表示されている状態（2回目Enter）
                    feedbackDisplay.textContent = ''; // フィードバックをクリア
                    currentWordIndex++; // 出題数をインクリメント
                    displayNextWord(); // 次の単語へ
                }
            }
        });

        // 初期状態
        japaneseMeaningDisplay.textContent = '';
        englishWordDisplay.textContent = 'ゲーム開始ボタンを押してください';
        textInput.disabled = true;
        updateRangeDisplay(); // 初期範囲表示

    </script>
